# Example Hyprland config for Mousetrap.
# Update MOUSETRAP_ROOT to point to your mousetrap installation.

$MOUSETRAP_ROOT = /home/pol/src/mousetrap

bind = SUPER, SPACE, exec, $MOUSETRAP_ROOT/packages/linux/activate.sh

submap = mousetrap
binde = , escape, exec, $MOUSETRAP_ROOT/packages/linux/cancel.sh
bind = , 1, exec, $MOUSETRAP_ROOT/packages/linux/key_down.sh 1
